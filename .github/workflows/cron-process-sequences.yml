name: cron-process-sequences

# Drains email_sequence_enrollments every 5 minutes by hitting
# /api/cron-process-sequences with the static bearer token.
# The endpoint runs the AiLys sequence engine: pulls due rows, sends step
# content via Resend, advances current_step, marks completed, etc.
#
# Operator setup (one-time):
#   1. Set GitHub repo secret CRON_PROCESS_SEQUENCES_TOKEN to the same
#      64-hex value uploaded to Cloudflare Pages secrets.
#   2. Merge this file to main. GitHub Actions schedule activates within
#      1-2 minutes after the first push to the default branch.
#
# Notes:
#   - GitHub schedule cron has up to ~5 min skew under load (not exact).
#     Acceptable for a 5-min cadence; would not be acceptable for sub-minute.
#   - workflow_dispatch enables manual trigger from the Actions tab for
#     debugging.
#   - The runner takes ~10s to spin up; keep job lean.

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST to cron-process-sequences
        env:
          TOKEN: ${{ secrets.CRON_PROCESS_SEQUENCES_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CRON_PROCESS_SEQUENCES_TOKEN secret is not set on this repo." >&2
            exit 1
          fi
          set -euo pipefail
          RESP=$(curl -sS -w '\nHTTP_STATUS=%{http_code}' \
            -X POST https://www.ailysagency.ca/api/cron-process-sequences \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' || true)
          BODY="$(printf '%s' "$RESP" | sed -e 's/HTTP_STATUS=.*$//')"
          STATUS="$(printf '%s' "$RESP" | tr -d '\n' | sed -E 's/.*HTTP_STATUS=([0-9]+).*/\1/')"
          echo "Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Non-200 response from cron-process-sequences."
            exit 1
          fi
