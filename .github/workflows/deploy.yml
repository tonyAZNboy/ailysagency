name: Deploy to Cloudflare Pages

# Auto-deploy on every push to main + manual trigger fallback.
# Requires repo secret CLOUDFLARE_API_TOKEN with scope:
#   Account > Cloudflare Pages > Edit  +  Account > Account Settings > Read

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── ISO-grade pre-merge gate ─────────────────────────────────────
      # Every push that reaches main must pass these gates before the
      # deploy step runs. CLAUDE.md test cadence steps 1-4 plus the new
      # smoke tests (B.4.x audit PDF pipeline). One failed assertion
      # blocks the deploy with an actionable error in the run log.

      - name: Gate 1, TypeScript typecheck
        run: npx tsc --noEmit

      - name: Gate 2, i18n deep audit (UI keys)
        run: node scripts/audit-translations-deep.mjs

      - name: Gate 3, blog translation audit (51 EN to FR-CA pairs)
        run: node scripts/audit-blog-translations.mjs

      - name: Gate 4, em-dash sweep (translations + blog + new server libs)
        # functions/api/chat-advisor.ts is allowlisted because its system
        # prompt LITERALLY contains the em-dash glyph as the example of
        # what Claude must not produce. Removing it would break the rule
        # that file enforces. All other paths must show zero matches.
        run: |
          set -e
          MATCHES=$(grep -rn "—" src/i18n/translations/ src/blog/posts/ functions/ 2>/dev/null | grep -v "functions/api/chat-advisor.ts" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Em-dash detected outside the documented exception; hard rule #2 violation"
            echo "$MATCHES"
            exit 1
          fi
          echo "Em-dash check clean (allowlist: functions/api/chat-advisor.ts system prompt)"

      - name: Gate 5, audit-pdf request validation smoke (16 cases)
        run: npx tsx scripts/smoke-audit-pdf-validation.mjs

      - name: Gate 6, audit-pdf render smoke (10-page PDF)
        run: npx tsx scripts/smoke-audit-pdf-render.mjs

      - name: Gate 7, audit-pdf HMAC signer smoke (11 cases)
        run: npx tsx scripts/smoke-audit-pdf-hmac.mjs

      - run: npm run build

      # Sanity check: token presence + scope verification BEFORE invoking
      # wrangler-action. wrangler-action@v3 swallows wrangler stderr when
      # the auth call fails, so the run shows only "exit code 1" with no
      # actionable signal. This step calls /user/tokens/verify so we see
      # the real Cloudflare error message in the run log.
      - name: Verify Cloudflare API token
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or missing in repo settings"
            exit 1
          fi
          echo "Token length: ${#CF_API_TOKEN}"
          RESP=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          echo "Verify response: $RESP"
          if ! echo "$RESP" | grep -qE '"status":[[:space:]]*"active"'; then
            echo "::error::Token verify failed; check token scopes and validity"
            exit 1
          fi
          # Sanity: can we list pages projects in this account?
          # Cloudflare returns pretty-printed JSON ("success": true with a space
          # after the colon), so the regex must tolerate optional whitespace.
          ACCT="3b889a272b6925fa7cbc892a83999541"
          PROJ_RESP=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects?per_page=1")
          if ! echo "$PROJ_RESP" | grep -qE '"success":[[:space:]]*true'; then
            echo "::error::Token cannot list Pages projects in account $ACCT"
            echo "Response: $PROJ_RESP"
            exit 1
          fi
          echo "Token has Pages access on the right account."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 3b889a272b6925fa7cbc892a83999541
          wranglerVersion: "4"
          command: pages deploy dist --project-name=ailysagency --branch=main
