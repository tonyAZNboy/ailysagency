name: Deploy to Cloudflare Pages

# Auto-trigger on push is DISABLED until CLOUDFLARE_API_TOKEN secret is set
# in the repo. Without that secret, wrangler-action exits 1 on every push and
# spams failure notifications. Until then we ship via manual `wrangler pages
# deploy dist --project-name=ailysagency` from a local checkout (the wrangler
# OAuth flow on the maintainer's machine handles auth there).
#
# To re-enable auto-deploy:
#   1. Generate a Cloudflare API token at
#      https://dash.cloudflare.com/profile/api-tokens
#      with scope: Account > Cloudflare Pages > Edit (and Account Read).
#   2. Add it to the repo as a secret named CLOUDFLARE_API_TOKEN at
#      https://github.com/tonyAZNboy/ailysagency/settings/secrets/actions
#   3. Uncomment the `push` block below and remove this notice.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 3b889a272b6925fa7cbc892a83999541
          command: pages deploy dist --project-name=ailysagency --branch=main
