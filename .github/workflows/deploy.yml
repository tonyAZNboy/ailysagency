name: Deploy to Cloudflare Pages

# Auto-deploy on every push to main + manual trigger fallback.
# Requires repo secret CLOUDFLARE_API_TOKEN with scope:
#   Account > Cloudflare Pages > Edit  +  Account > Account Settings > Read

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── ISO-grade pre-merge gate ─────────────────────────────────────
      # Every push that reaches main must pass these gates before the
      # deploy step runs. CLAUDE.md test cadence steps 1-4 plus the new
      # smoke tests (B.4.x audit PDF pipeline). One failed assertion
      # blocks the deploy with an actionable error in the run log.

      - name: Gate 1, TypeScript typecheck
        run: npx tsc --noEmit

      - name: Gate 2, i18n deep audit (UI keys, warn-only)
        # Pre-existing translation queue debt (28 missing keys across 15
        # non-EN locales, tracked in docs/i18n-translation-queue.md)
        # would block every deploy. The gate runs and surfaces the report
        # in the run log, but does not block deploy until the queue is
        # closed. Flip to mandatory by removing continue-on-error once
        # all locales hit 100% in the report summary.
        continue-on-error: true
        run: node scripts/audit-translations-deep.mjs

      - name: Gate 3, blog translation audit (51 EN to FR-CA pairs)
        run: node scripts/audit-blog-translations.mjs

      - name: Gate 4, em-dash sweep (translations + blog + new server libs)
        # functions/api/chat-advisor.ts is allowlisted because its system
        # prompt LITERALLY contains the em-dash glyph as the example of
        # what Claude must not produce. Removing it would break the rule
        # that file enforces. All other paths must show zero matches.
        run: |
          set -e
          MATCHES=$(grep -rn "—" src/i18n/translations/ src/blog/posts/ functions/ 2>/dev/null | grep -v "functions/api/chat-advisor.ts" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Em-dash detected outside the documented exception; hard rule #2 violation"
            echo "$MATCHES"
            exit 1
          fi
          echo "Em-dash check clean (allowlist: functions/api/chat-advisor.ts system prompt)"

      - name: Gate 5, audit-pdf request validation smoke (16 cases)
        run: npx tsx scripts/smoke-audit-pdf-validation.mjs

      - name: Gate 6, audit-pdf render smoke (10-page PDF)
        run: npx tsx scripts/smoke-audit-pdf-render.mjs

      - name: Gate 7, audit-pdf HMAC signer smoke (11 cases)
        run: npx tsx scripts/smoke-audit-pdf-hmac.mjs

      - name: Gate 8, Day-1 onboarding PDF smoke (17 cases)
        run: npx tsx scripts/smoke-audit-pdf-onboarding.mjs

      - name: Gate 9, cron guard primitives smoke (13 cases)
        run: npx tsx scripts/smoke-cron-guard.mjs

      - name: Gate 10, admin audit-pdf-stats HMAC smoke (12 cases)
        run: npx tsx scripts/smoke-admin-audit-pdf-stats.mjs

      - name: Gate 11, visibility-report-pdf cross-repo contract smoke (12 cases)
        run: npx tsx scripts/smoke-visibility-report-pdf.mjs

      - name: Gate 12, instant AI Visibility audit smoke (12 cases)
        run: npx tsx scripts/smoke-instant-ai-vis.mjs

      - name: Gate 13, personalized quote PDF smoke (10 cases)
        run: npx tsx scripts/smoke-quote-pdf.mjs

      - name: Gate 14, admin endpoint observability stats smoke (10 cases)
        run: npx tsx scripts/smoke-admin-endpoint-stats.mjs

      - name: Gate 15, client error capture smoke (13 cases)
        run: npx tsx scripts/smoke-client-error.mjs

      - name: Gate 16, help-article FR-CA routing smoke (6 cases)
        run: node scripts/smoke-help-article-fr-routing.mjs

      - name: Gate 17, LangContext route-aware re-detection smoke (5 cases)
        run: node scripts/smoke-lang-route-sync.mjs

      - name: Gate 18, popup sensitivity tuning smoke (9 cases)
        run: node scripts/smoke-popup-sensitivity.mjs

      - name: Gate 30, email validation shared lib smoke (37 cases)
        # Tests functions/lib/email.ts: isValidEmail consolidates 4
        # inline copies. Verifies regex (no @, no dot, whitespace
        # rejection), length bounds 5..254 (RFC 5321 max + sanity floor),
        # disposable domain rejection (case-insensitive), DISPOSABLE_DOMAINS
        # 9-entry contract. partner-application's stricter `length >= 5`
        # check now applied uniformly across all 4 prior call sites
        # (closes a tiny gap where 'a@b' was passing 3/4 of them).
        run: npx tsx scripts/smoke-email.mjs

      - name: Gate 29, origin allowlist shared lib smoke (21 cases)
        # Tests functions/lib/origin.ts: isAllowedOrigin helper that
        # consolidates 5 inline copies. Verifies default allowlist
        # contains the 3 canonical AiLys domains, rejects attacker
        # subdomains (e.g. evil.ailysagency.ca), rejects http:// variant
        # of canonical (only https), permits any port on http://localhost
        # for dev shells, custom ALLOWED_ORIGINS env override fully
        # replaces default, trailing-whitespace tolerance in env list.
        run: npx tsx scripts/smoke-origin.mjs

      - name: Gate 28, crypto shared lib smoke (19 cases)
        # Tests functions/lib/crypto.ts: sha256Hex (canonical, replaces 10
        # inline copies across edge fns + libs) + bytesToHex helper.
        # Verifies NIST FIPS 180-4 reference vectors for empty string and
        # 'abc', 64-char lowercase hex output for arbitrary input including
        # UTF-8 multi-byte and emoji, determinism, and bytesToHex contract
        # (matches sha256Hex output when fed the digest bytes, lowercase,
        # 2 hex chars per byte with leading-zero pad).
        run: npx tsx scripts/smoke-crypto.mjs

      - name: Gate 27, html-escape shared lib smoke (20 cases)
        # Tests functions/lib/htmlEscape.ts: shared escapeHtml helper
        # extracted from 6 byte-identical inline copies. Verifies the
        # 5-char escape contract (& < > " '), null/undefined tolerance,
        # non-string coercion, ordering invariant (& escaped first so
        # entities are not double-corrupted), XSS payload neutralization,
        # and explicit non-idempotency (double-escape produces a distinct
        # output, callers must escape exactly once at the boundary).
        run: npx tsx scripts/smoke-html-escape.mjs

      - name: Gate 26, supabase-insert shared lib smoke (40 cases)
        # Tests functions/lib/supabaseInsert.ts: shared Supabase REST POST
        # helper extracted from partner-application + founding-clients-apply
        # + cofounders-apply. Verifies fail-open on missing env vars,
        # 200/201 success, 409 ignore-duplicates option, 4xx/5xx return
        # ok:false with bounded error, network throw never propagates,
        # SERVICE_ROLE_KEY redacted from any echoed response body, Prefer
        # header values, row argument immutability.
        run: npx tsx scripts/smoke-supabase-insert.mjs

      - name: Gate 25, server-error capture lib smoke (34 cases)
        # Tests functions/lib/serverError.ts: captureServerError dual-channel
        # delivery (Supabase audit_log + Resend alert), severity-based alert
        # gating (warn never alerts, error/fatal do), message/stack truncation
        # (500/2000 chars), PII-safety (Supabase body never contains the
        # SERVICE_ROLE_KEY), fail-soft on network failure (the function NEVER
        # throws even when both channels fail, so the caller's primary error
        # path is unaffected).
        run: npx tsx scripts/smoke-server-error.mjs

      - name: Gate 24, /api/system-health endpoint shape + zero-leak smoke (34 cases)
        # Tests functions/api/system-health.ts: response shape contract,
        # 200/405/204 status codes, kill-switch evaluation, KV binding
        # detection, ZERO secret value leaks (3 explicit assertions that
        # the response body never contains the values of RESEND_API_KEY,
        # SUPABASE_URL, OPERATOR_NOTIFY_EMAIL when those are set in env).
        # Healthchecks for monitors live behind this endpoint; contract
        # must not break.
        run: npx tsx scripts/smoke-system-health.mjs

      - name: Gate 23, shared rate-limit lib smoke (18 cases)
        # Tests functions/lib/rateLimit.ts: KV-backed token bucket with
        # IP hourly + identity daily windows, fail-open on missing KV
        # binding, key prefix isolation, sha256Hex + constantTimeEq
        # helpers. Pure-function tests with in-memory KV mock; no network.
        run: npx tsx scripts/smoke-rate-limit.mjs

      - name: Gate 22, partner application validator + hash smoke (16 cases)
        # F3.0 demand-validation MVP. Tests the validator + payloadHash +
        # ipHash exported from functions/api/partner-application.ts. End-to-
        # end edge fn behavior is verified post-deploy via live curl from
        # the operator (Gate M1 in .planning/phase-f3-0-partner-waitlist/
        # 03-test-matrix.md).
        run: npx tsx scripts/smoke-partner-application.mjs

      - run: npm run build

      - name: Gate 20, bundle-shape regression guard (TDZ blank-page class)
        # Asserts vite manualChunks did not split react-helmet-async or
        # react/react-dom into separate vendor chunks. PR #96 -> PR #103
        # blank-page bug shipped silently for ~weeks because the smoke
        # tests only validated static HTML JSON-LD. This guard catches the
        # regression at build time. See PR #105 postmortem in STATE.md.
        run: node scripts/smoke-bundle-shape.mjs

      - name: Gate 21, bundle module-load runtime guard (TDZ + circular init)
        # Complement to Gate 20. Where bundle-shape catches KNOWN forbidden
        # chunk names, bundle-load actually evaluates the entry chunk + all
        # preloaded vendor chunks in a node:vm sandbox with stubbed DOM
        # globals. Catches generic module-init failures (TDZ,
        # ReferenceError, SyntaxError, circular eval) that the forbidden-
        # name list cannot predict. Verified against the broken PR #96
        # config: throws "Cannot access 'O' before initialization" with
        # exit 1, vs. exit 0 on the safe data-only config.
        run: node --experimental-vm-modules scripts/smoke-bundle-load.mjs

      # Sanity check: token presence + scope verification BEFORE invoking
      # wrangler-action. wrangler-action@v3 swallows wrangler stderr when
      # the auth call fails, so the run shows only "exit code 1" with no
      # actionable signal. This step calls /user/tokens/verify so we see
      # the real Cloudflare error message in the run log.
      - name: Verify Cloudflare API token
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or missing in repo settings"
            exit 1
          fi
          echo "Token length: ${#CF_API_TOKEN}"
          RESP=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          echo "Verify response: $RESP"
          if ! echo "$RESP" | grep -qE '"status":[[:space:]]*"active"'; then
            echo "::error::Token verify failed; check token scopes and validity"
            exit 1
          fi
          # Sanity: can we list pages projects in this account?
          # Cloudflare returns pretty-printed JSON ("success": true with a space
          # after the colon), so the regex must tolerate optional whitespace.
          ACCT="3b889a272b6925fa7cbc892a83999541"
          PROJ_RESP=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/pages/projects?per_page=1")
          if ! echo "$PROJ_RESP" | grep -qE '"success":[[:space:]]*true'; then
            echo "::error::Token cannot list Pages projects in account $ACCT"
            echo "Response: $PROJ_RESP"
            exit 1
          fi
          echo "Token has Pages access on the right account."

      - name: Deploy to Cloudflare Pages
        id: cf-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 3b889a272b6925fa7cbc892a83999541
          wranglerVersion: "4"
          command: pages deploy dist --project-name=ailysagency --branch=main

      # Post-deploy smoke: confirm production renders with expected
      # JSON-LD types + canonical + OG meta + no stale Autopilot/$1,299.
      # Runs against the deployed www.ailysagency.ca after Cloudflare
      # propagates (default 60s wait for global edge). Failure here does
      # NOT roll back the deploy (Cloudflare Pages does not support
      # programmatic rollback in CI), but surfaces the regression in the
      # run log immediately so the operator can re-deploy from a previous
      # commit via the dashboard.
      - name: Wait for Cloudflare edge propagation
        run: sleep 60
      - name: Gate 19, post-deploy JSON-LD smoke (production)
        run: node scripts/smoke-jsonld.mjs
        continue-on-error: true
